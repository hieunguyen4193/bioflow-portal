services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bioflow
      POSTGRES_PASSWORD: bioflow
      POSTGRES_DB: bioflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioflow -d bioflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ${BIOFLOW_DATA_DIR}/uploads:/data/uploads
      - ${BIOFLOW_DATA_DIR}/results:/data/results
      - ${BIOFLOW_DATA_DIR}/explore:/data/explore
      - ./nextflow:/nextflow
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      HOST_DATA_DIR: ${BIOFLOW_DATA_DIR}
      HOST_R_SCRIPTS: ${BIOFLOW_R_SCRIPTS}
      PIPELINE_IMAGE: ${PIPELINE_IMAGE:-pipeline-portal/r-pipeline:latest}
      EXPLORE_DIR: /data/explore
      R_SCRIPTS_DIR: /app/app/r_scripts
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000


volumes:
  pgdata:
